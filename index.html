<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rank Operator by Frame</title>
    <link rel="stylesheet" crossorigin href="./assets/index-D9OKTD0v.css">
    <style>
      .pin-gate {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          linear-gradient(180deg, rgba(238, 249, 247, 0.7), rgba(250, 250, 247, 0) 320px),
          #fafaf7;
        color: #151917;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .pin-card {
        width: min(430px, calc(100vw - 32px));
        border: 1px solid #e1e5e2;
        border-radius: 20px;
        background: #fff;
        box-shadow: 0 18px 46px rgba(21, 25, 23, 0.1);
        padding: 24px;
      }
      .pin-mark {
        display: grid;
        place-items: center;
        width: 38px;
        height: 38px;
        border: 1px solid rgba(15, 118, 110, 0.22);
        border-radius: 12px;
        background: #eef9f7;
        color: #0f766e;
        font-weight: 760;
        margin-bottom: 18px;
      }
      .pin-card h1 { margin: 0; font-size: 24px; letter-spacing: 0; }
      .pin-card p { margin: 10px 0 18px; color: #4f5b55; line-height: 1.55; }
      .pin-card label { display: grid; gap: 8px; color: #4f5b55; font-size: 13px; font-weight: 650; }
      .pin-card input {
        width: 100%;
        height: 48px;
        border: 1px solid #cfd7d3;
        border-radius: 14px;
        color: #151917;
        font: inherit;
        font-size: 20px;
        letter-spacing: 0.16em;
        padding: 0 14px;
      }
      .pin-card button {
        width: 100%;
        height: 46px;
        margin-top: 12px;
        border: 0;
        border-radius: 14px;
        background: #0f766e;
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
      }
      .pin-error { min-height: 20px; margin-top: 10px; color: #b91c1c; font-size: 13px; }
      .pin-card small { display: block; margin-top: 18px; color: #7a8580; line-height: 1.4; }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="pin-gate">
        <section class="pin-card">
          <div class="pin-mark">R</div>
          <h1>Rank Operator</h1>
          <p>This demo contains live AO data and is PIN-protected.</p>
          <form id="pin-form">
            <label>
              PIN
              <input id="pin-input" inputmode="numeric" autocomplete="one-time-code" maxlength="12" autofocus />
            </label>
            <button type="submit">Unlock demo</button>
            <div class="pin-error" role="alert"></div>
          </form>
          <small>Access is restricted to approved reviewers. Do not share screenshots or extracted data externally.</small>
        </section>
      </main>
    </div>
    <script type="module">
      const form = document.querySelector("#pin-form");
      const input = document.querySelector("#pin-input");
      const error = document.querySelector(".pin-error");
      const decoder = new TextDecoder();

      function fromBase64(value) {
        return Uint8Array.from(atob(value), (char) => char.charCodeAt(0));
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        error.textContent = "Unlocking...";
        try {
          const payload = await fetch("./assets/app.enc.json", { cache: "no-store" }).then((response) => response.json());
          const keyMaterial = await crypto.subtle.importKey(
            "raw",
            new TextEncoder().encode(input.value),
            "PBKDF2",
            false,
            ["deriveKey"]
          );
          const key = await crypto.subtle.deriveKey(
            {
              name: "PBKDF2",
              salt: fromBase64(payload.salt),
              iterations: payload.iterations,
              hash: "SHA-256"
            },
            keyMaterial,
            { name: "AES-GCM", length: 256 },
            false,
            ["decrypt"]
          );
          const encrypted = fromBase64(payload.ciphertext);
          const tag = fromBase64(payload.tag);
          const data = new Uint8Array(encrypted.length + tag.length);
          data.set(encrypted);
          data.set(tag, encrypted.length);
          const plaintext = await crypto.subtle.decrypt(
            { name: "AES-GCM", iv: fromBase64(payload.iv), tagLength: 128 },
            key,
            data
          );
          const blob = new Blob([decoder.decode(plaintext)], { type: "text/javascript" });
          await import(URL.createObjectURL(blob));
        } catch {
          input.select();
          error.textContent = "PIN not recognised.";
        }
      });
    </script>
  </body>
</html>
